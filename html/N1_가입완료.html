<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N1 가입완료 — Happickle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#558d60;
    --ink:#1f2937;
    --live:#F43F5E;
    --bg:#f7faf8;
    --surface:#fff;
    --muted:#6b7280;
    --line:#e4e7e5;
    --mint:#e9f1ea;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Noto Sans KR',sans-serif;
    background:#e9ecef;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:32px 0;
  }
  .phone{
    width:390px;
    height:700px;
    background:var(--bg);
    box-shadow:0 12px 40px rgba(15,27,45,.14);
    border-radius:8px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .check-circle{
    margin-top:100px;
    width:80px;
    height:80px;
    border-radius:40px;
    background:var(--brand);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  h1{
    margin-top:20px;
    font-size:22px;
    font-weight:900;
    color:var(--ink);
    text-align:center;
  }
  .sub{
    margin-top:10px;
    font-size:14px;
    font-weight:500;
    color:var(--muted);
    text-align:center;
  }
  .welcome-card{
    margin-top:47px;
    width:350px;
    height:100px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    display:flex;
    align-items:center;
    padding:0 16px;
  }
  .avatar{
    width:52px;
    height:52px;
    border-radius:26px;
    background:var(--mint);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .welcome-text{margin-left:16px}
  .welcome-text b{
    display:block;
    font-size:16px;
    font-weight:700;
    color:var(--ink);
  }
  .welcome-text span{
    display:block;
    margin-top:5px;
    font-size:12px;
    font-weight:400;
    color:var(--muted);
  }
  .btn-start{
    margin-top:auto;
    margin-bottom:78px;
    width:350px;
    height:52px;
    border:none;
    border-radius:14px;
    background:var(--brand);
    color:#fff;
    font-family:'Noto Sans KR',sans-serif;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
  }
</style>
</head>
<body>
<div class="phone">
  <main style="display:flex;flex-direction:column;align-items:center;width:100%;flex:1">
    <!-- check_circle -->
    <div class="check-circle" aria-hidden="true">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 20.5 L16.5 28 L31.5 12.5" stroke="#fff" stroke-width="4.33" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>회원가입이 완료됐어요</h1>
    <p class="sub">Happickle와 함께 대회를 즐겨보세요</p>

    <!-- welcome_card -->
    <section class="welcome-card">
      <div class="avatar" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="13" cy="8.7" r="4.3" stroke="#558d60" stroke-width="1.95"/>
          <path d="M4.9 21.7c.7-3.7 4.1-6.5 8.1-6.5s7.4 2.8 8.1 6.5" stroke="#558d60" stroke-width="1.95" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="welcome-text">
        <b>김민준님, 반가워요!</b>
        <span>DUPR 4.2 · 송파피클볼클럽</span>
      </div>
    </section>

    <button type="button" class="btn-start">시작하기</button>
  </main>
</div>
</body>
</html>
