<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M1 탐색홈 — Happickle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#558d60;
    --ink:#1f2937;
    --live:#F43F5E;
    --bg:#f7faf8;
    --surface:#fff;
    --muted:#6b7280;
    --faint:#9ca3af;
    --line:#e4e7e5;
    --mint:#e9f1ea;
    --header:#eef5f0;
    --ball:#f4bf35;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Noto Sans KR',sans-serif;
    margin:0;
    background:var(--bg);
  }
  .phone{
    width:100%;
    max-width:480px;
    margin:0 auto;
    min-height:100dvh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
  }
  .scroll{flex:1}

  /* 헤더 */
  header{
    background:var(--header);
    padding:16px 24px 0;
    height:188px;
    position:relative;
  }
  .logo{
    margin-top:12px;
    display:flex;
    align-items:flex-start;
    gap:1px;
  }
  .logo .word{
    font-size:32px;
    font-weight:900;
    letter-spacing:-1.2px;
    line-height:1.15;
    color:#549a3d;
  }
  .logo svg.paddle{margin-top:5px}
  .assoc-pill{
    display:inline-flex;
    align-items:center;
    height:26px;
    padding:0 11px;
    margin-top:5px;
    border-radius:13px;
    background:rgba(85,141,96,.16);
    font-size:11px;
    font-weight:500;
    color:#4c7857;
  }
  .headline{
    margin-top:12px;
    font-size:22px;
    font-weight:700;
    color:var(--ink);
  }
  .bell-btn{
    position:absolute;
    top:32px;
    right:24px;
    width:40px;
    height:40px;
    border:none;
    border-radius:20px;
    background:rgba(85,141,96,.16);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }

  /* 검색 바 */
  .search-bar{
    margin:-26px 20px 0;
    height:52px;
    background:var(--surface);
    border-radius:14px;
    box-shadow:0 6px 16px rgba(18,48,58,.09);
    display:flex;
    align-items:center;
    gap:8px;
    padding:0 16px;
    position:relative;
  }
  .search-bar span{font-size:14px;font-weight:400;color:var(--faint)}

  /* 필터 행 */
  .filter-row{
    margin:18px 20px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .region-pill{
    height:42px;
    border-radius:21px;
    background:#e3eee6;
    border:1px solid #c8decd;
    display:flex;
    align-items:center;
    gap:6px;
    padding:0 12px 0 14px;
    font-family:'Noto Sans KR',sans-serif;
    cursor:pointer;
  }
  .region-pill b{font-size:14px;font-weight:700;color:var(--brand)}
  .sort-pill{
    height:42px;
    border-radius:21px;
    background:var(--surface);
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    gap:12px;
    padding:0 12px 0 14px;
    font-family:'Noto Sans KR',sans-serif;
    font-size:13px;
    font-weight:500;
    color:var(--muted);
    cursor:pointer;
  }

  /* 상태 칩 */
  .chip-row{margin:22px 20px 0;display:flex;gap:8px}
  .chip{
    height:36px;
    border-radius:18px;
    padding:0 18px;
    background:var(--surface);
    border:1px solid var(--line);
    font-family:'Noto Sans KR',sans-serif;
    font-size:13px;
    font-weight:500;
    color:var(--muted);
    cursor:pointer;
  }
  .chip.active{
    background:var(--brand);
    border-color:var(--brand);
    color:#fff;
  }

  /* 섹션 헤더 */
  .list-head{
    margin:24px 20px 0;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  .list-head h2{font-size:18px;font-weight:700;color:var(--ink)}
  .list-head span{font-size:13px;font-weight:500;color:var(--faint)}

  /* 대회 카드 */
  .card{
    margin:18px 20px 0;
    background:var(--surface);
    border-radius:18px;
    box-shadow:0 8px 22px rgba(18,48,58,.10);
    overflow:hidden;
  }
  .card-img{position:relative;height:150px;background:var(--mint)}
  .card-img svg.scene{display:block;width:100%;height:100%}
  .badge{
    position:absolute;
    top:14px;
    left:14px;
    height:28px;
    border-radius:14px;
    padding:0 12px;
    background:var(--brand);
    color:#fff;
    font-size:12px;
    font-weight:700;
    display:flex;
    align-items:center;
  }
  .badge.playing{background:#ed7040}
  .dday{
    position:absolute;
    top:14px;
    right:14px;
    height:28px;
    border-radius:14px;
    padding:0 13px;
    background:rgba(18,48,58,.62);
    color:#fff;
    font-size:12px;
    font-weight:700;
    display:flex;
    align-items:center;
  }
  .card-body{padding:16px}
  .card-title{font-size:16px;font-weight:700;color:var(--ink)}
  .meta-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:10px;
  }
  .meta-row + .meta-row{margin-top:6px}
  .meta-row svg{flex-shrink:0}
  .meta-row span{font-size:12.5px;font-weight:400;color:var(--muted)}
  .meta-row.loc span{font-size:13px}
  .opt-row{display:flex;gap:8px;margin-top:14px}
  .opt{
    height:26px;
    border-radius:13px;
    padding:0 13px;
    background:var(--mint);
    font-size:12px;
    font-weight:500;
    color:#557a5e;
    display:flex;
    align-items:center;
  }
  .card-divider{height:1px;background:var(--line);margin-top:22px}
  .card-foot{
    margin-top:6px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
  }
  .fee-label{font-size:11px;font-weight:400;color:var(--faint)}
  .fee{font-size:16px;font-weight:700;color:var(--ink);margin-top:1px}
  .quota{text-align:right}
  .quota b{font-size:12px;font-weight:700;color:var(--brand)}
  .prog-track{
    width:102px;
    height:6px;
    border-radius:3px;
    background:var(--line);
    margin-top:7px;
    overflow:hidden;
  }
  .prog-fill{width:76px;height:6px;border-radius:3px;background:var(--brand)}

  .list-tail{height:24px}

  /* 하단 탭바 */
  .tabbar{
    position:sticky;
    bottom:0;
    min-height:80px;
    padding-bottom:env(safe-area-inset-bottom);
    background:var(--surface);
    border-top:1px solid var(--line);
    box-shadow:0 -3px 14px rgba(18,48,58,.06);
    display:flex;
    flex-shrink:0;
  }
  .tab{
    flex:1;
    border:none;
    background:transparent;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding-top:14px;
    gap:8px;
    font-family:'Noto Sans KR',sans-serif;
    font-size:11px;
    font-weight:500;
    color:var(--muted);
    cursor:pointer;
  }
  .tab.active{color:var(--brand)}
</style>
</head>
<body>
<div class="phone">
  <div class="scroll">
    <header>
      <!-- happickle_logo -->
      <div class="logo" aria-label="Happickle">
        <span class="word">Ha</span><!--
        --><svg class="paddle" width="15" height="29" viewBox="0 0 16 30" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="8" cy="8.5" r="8" fill="#ef8b2c"/>
          <rect x="5.6" y="15" width="4.8" height="13" rx="2.4" fill="#ef8b2c"/>
        </svg><!--
        --><svg class="paddle" width="15" height="29" viewBox="0 0 16 30" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="8" cy="8.5" r="8" fill="#f4bf35"/>
          <rect x="5.6" y="15" width="4.8" height="13" rx="2.4" fill="#f4bf35"/>
        </svg><!--
        --><span class="word">ickle</span>
      </div>
      <div class="assoc-pill">대한피클볼협회 공식</div>
      <h1 class="headline">어떤 대회에 나가볼까요?</h1>
      <button type="button" class="bell-btn" aria-label="알림">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3.5c-3.1 0-5.3 2.3-5.3 5.2v3.1L5 15.2c-.3.6.1 1.3.8 1.3h12.4c.7 0 1.1-.7.8-1.3l-1.7-3.4V8.7c0-2.9-2.2-5.2-5.3-5.2Z" stroke="#1f2937" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M10.3 20a1.9 1.9 0 0 0 3.4 0" stroke="#1f2937" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <!-- 검색 바 -->
    <div class="search-bar" role="search">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="9.2" cy="9.2" r="5.8" stroke="#9ca3af" stroke-width="1.6"/>
        <path d="M13.7 13.7 L16.7 16.7" stroke="#9ca3af" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span>대회명으로 검색</span>
    </div>

    <!-- 지역 / 정렬 -->
    <div class="filter-row">
      <button type="button" class="region-pill">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M9 2.3c-2.9 0-5.2 2.3-5.2 5.1 0 3.8 5.2 8.3 5.2 8.3s5.2-4.5 5.2-8.3c0-2.8-2.3-5.1-5.2-5.1Z" stroke="#558d60" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="9" cy="7.5" r="1.9" stroke="#558d60" stroke-width="1.5"/>
        </svg>
        <b>서울특별시</b>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M3.5 5.5 L7 9 L10.5 5.5" stroke="#558d60" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button type="button" class="sort-pill">
        최신순
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M3.5 5.5 L7 9 L10.5 5.5" stroke="#5b6b72" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- 상태 칩 -->
    <div class="chip-row">
      <button type="button" class="chip active">접수중</button>
      <button type="button" class="chip">접수마감</button>
      <button type="button" class="chip">종료</button>
    </div>

    <!-- 섹션 헤더 -->
    <div class="list-head">
      <h2>접수 중인 대회</h2>
      <span>총 12개</span>
    </div>

    <!-- 카드 1 -->
    <article class="card">
      <div class="card-img">
        <svg class="scene" viewBox="0 0 350 150" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
          <rect width="350" height="150" fill="#e9f1ea"/>
          <polygon points="75,25 275,25 330,127 20,127" fill="#558d60" opacity="0.14"/>
          <polygon points="75,25 275,25 330,127 20,127" stroke="#558d60" stroke-width="2" fill="none"/>
          <line x1="175" y1="25" x2="175" y2="127" stroke="#558d60" stroke-width="2" opacity="0.6"/>
          <line x1="63" y1="52" x2="287" y2="52" stroke="#558d60" stroke-width="2" opacity="0.5"/>
          <line x1="41" y1="98" x2="309" y2="98" stroke="#558d60" stroke-width="2" opacity="0.5"/>
          <line x1="20" y1="75" x2="330" y2="75" stroke="#1f2937" stroke-width="2"/>
          <circle cx="20" cy="75" r="4" fill="#1f2937"/>
          <circle cx="330" cy="75" r="4" fill="#1f2937"/>
          <circle cx="120" cy="38" r="7" fill="#1f2937" opacity="0.65"/>
          <circle cx="220" cy="38" r="7" fill="#1f2937" opacity="0.65"/>
          <circle cx="110" cy="112" r="9" fill="#558d60"/>
          <circle cx="230" cy="112" r="9" fill="#558d60"/>
          <circle cx="175" cy="72" r="5" fill="#f4bf35" stroke="#2b1c15" stroke-width="1"/>
        </svg>
        <span class="badge">접수중</span>
        <span class="dday">D-5</span>
      </div>
      <div class="card-body">
        <h3 class="card-title">2026 협회장배 전국오픈</h3>
        <div class="meta-row">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="2.3" y="3.3" width="11.3" height="10.7" rx="1.6" stroke="#8b98a0" stroke-width="1.2"/>
            <path d="M2.3 6.3 H13.7" stroke="#8b98a0" stroke-width="1.2"/>
            <path d="M5.3 2 V4.3 M10.7 2 V4.3" stroke="#8b98a0" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span>8월 9일 (토) · 오전 9:00</span>
        </div>
        <div class="meta-row loc">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M8 2c-2.6 0-4.7 2-4.7 4.6C3.3 10 8 14 8 14s4.7-4 4.7-7.4C12.7 4 10.6 2 8 2Z" stroke="#8b98a0" stroke-width="1.2" stroke-linejoin="round"/>
            <circle cx="8" cy="6.7" r="1.6" stroke="#8b98a0" stroke-width="1.2"/>
          </svg>
          <span>올림픽공원 SK핸드볼경기장</span>
        </div>
        <div class="opt-row">
          <span class="opt">남자복식</span>
          <span class="opt">혼합복식</span>
          <span class="opt">+2</span>
        </div>
        <div class="card-divider"></div>
        <div class="card-foot">
          <div>
            <div class="fee-label">참가비</div>
            <div class="fee">30,000원</div>
          </div>
          <div class="quota">
            <b>신청 48 / 64</b>
            <div class="prog-track"><div class="prog-fill"></div></div>
          </div>
        </div>
      </div>
    </article>

    <!-- 카드 2 -->
    <article class="card" style="margin-top:16px">
      <div class="card-img">
        <svg class="scene" viewBox="0 0 350 150" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
          <rect width="350" height="150" fill="#e9f1ea"/>
          <polygon points="75,25 275,25 330,127 20,127" fill="#558d60" opacity="0.14"/>
          <polygon points="75,25 275,25 330,127 20,127" stroke="#558d60" stroke-width="2.5" fill="none"/>
          <line x1="175" y1="25" x2="175" y2="127" stroke="#558d60" stroke-width="1.5" opacity="0.6"/>
          <line x1="63" y1="52" x2="287" y2="52" stroke="#558d60" stroke-width="1.5" opacity="0.5"/>
          <line x1="41" y1="98" x2="309" y2="98" stroke="#558d60" stroke-width="1.5" opacity="0.5"/>
          <line x1="20" y1="75" x2="330" y2="75" stroke="#1f2937" stroke-width="2"/>
          <circle cx="20" cy="75" r="4" fill="#1f2937"/>
          <circle cx="330" cy="75" r="4" fill="#1f2937"/>
          <circle cx="115" cy="38" r="7" fill="#f4bf35" opacity="0.85"/>
          <circle cx="235" cy="38" r="7" fill="#f4bf35" opacity="0.85"/>
          <circle cx="105" cy="112" r="9" fill="#558d60"/>
          <circle cx="225" cy="112" r="9" fill="#558d60"/>
          <circle cx="175" cy="80" r="5" fill="#f4bf35" stroke="#2b1c15" stroke-width="1"/>
        </svg>
        <span class="badge playing">경기중</span>
      </div>
      <div class="card-body">
        <h3 class="card-title">제2회 한강 오픈 챌린지</h3>
        <div class="meta-row loc">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="2.3" y="3.3" width="11.3" height="10.7" rx="1.6" stroke="#8b98a0" stroke-width="1.2"/>
            <path d="M2.3 6.3 H13.7" stroke="#8b98a0" stroke-width="1.2"/>
            <path d="M5.3 2 V4.3 M10.7 2 V4.3" stroke="#8b98a0" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span>8월 2일 (토) · 진행 중</span>
        </div>
      </div>
    </article>

    <div class="list-tail"></div>
  </div>

  <!-- 하단 탭바 -->
  <nav class="tabbar">
    <button type="button" class="tab active">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="12" cy="12" r="8.5" stroke="#558d60" stroke-width="1.9"/>
        <circle cx="12" cy="12" r="3.5" stroke="#558d60" stroke-width="1.9"/>
      </svg>
      탐색
    </button>
    <button type="button" class="tab">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="3.5" y="5" width="17" height="16" rx="2.5" stroke="#97a5ab" stroke-width="1.8"/>
        <path d="M3.5 9.5 H20.5" stroke="#97a5ab" stroke-width="1.8"/>
        <path d="M8 3 V6 M16 3 V6" stroke="#97a5ab" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      내 경기
    </button>
    <button type="button" class="tab">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M12 3.5c-3.1 0-5.3 2.3-5.3 5.2v3.1L5 15.2c-.3.6.1 1.3.8 1.3h12.4c.7 0 1.1-.7.8-1.3l-1.7-3.4V8.7c0-2.9-2.2-5.2-5.3-5.2Z" stroke="#97a5ab" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M10.3 20a1.9 1.9 0 0 0 3.4 0" stroke="#97a5ab" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      알림
    </button>
    <button type="button" class="tab">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="12" cy="8" r="4" stroke="#97a5ab" stroke-width="1.8"/>
        <path d="M4.5 20c.6-3.4 3.7-6 7.5-6s6.9 2.6 7.5 6" stroke="#97a5ab" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      마이
    </button>
  </nav>
</div>
</body>
</html>
