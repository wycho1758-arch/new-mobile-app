<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M0A 로그인 — Happickle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#558d60;
    --ink:#1f2937;
    --live:#F43F5E;
    --bg:#f7faf8;
    --surface:#fff;
    --muted:#6b7280;
    --mint:#e9f1ea;
    --kakao:#fee500;
    --kakao-ink:#2b1c15;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Noto Sans KR',sans-serif;
    margin:0;
    background:var(--bg);
  }
  .phone{
    width:100%;
    max-width:480px;
    margin:0 auto;
    min-height:100dvh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  /* 로고 워드마크 */
  .logo{
    margin-top:150px;
    display:flex;
    align-items:flex-start;
    gap:1px;
  }
  .logo .word{
    font-size:33px;
    font-weight:900;
    letter-spacing:-1.2px;
    line-height:1.15;
    color:#549a3d;
  }
  .logo svg.paddle{margin-top:5px}
  .tagline{
    margin-top:5px;
    font-size:12px;
    font-weight:500;
    color:var(--muted);
    text-align:center;
  }
  /* 일러스트 */
  .ill-wrap{
    margin-top:30px;
    width:84px;
    height:84px;
    border-radius:42px;
    background:var(--mint);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  /* 소셜 로그인 버튼 */
  .btn{
    width:calc(100% - 80px);
    max-width:400px;
    height:52px;
    border:none;
    border-radius:14px;
    font-family:'Noto Sans KR',sans-serif;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .btn-kakao{
    margin-top:56px;
    background:var(--kakao);
    color:var(--kakao-ink);
  }
  .btn-apple{
    margin-top:12px;
    background:var(--ink);
    color:#fff;
  }
  .hint{
    margin-top:16px;
    margin-bottom:114px;
    font-size:12px;
    font-weight:500;
    color:var(--muted);
    text-align:center;
  }
</style>
</head>
<body>
<div class="phone">
  <main style="display:flex;flex-direction:column;align-items:center;width:100%">
    <!-- happickle_logo -->
    <h1 class="logo" aria-label="Happickle">
      <span class="word">Ha</span><!--
      --><svg class="paddle" width="16" height="30" viewBox="0 0 16 30" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="8" cy="8.5" r="8" fill="#ef8b2c"/>
        <rect x="5.6" y="15" width="4.8" height="13" rx="2.4" fill="#ef8b2c"/>
      </svg><!--
      --><svg class="paddle" width="16" height="30" viewBox="0 0 16 30" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="8" cy="8.5" r="8" fill="#f4bf35"/>
        <rect x="5.6" y="15" width="4.8" height="13" rx="2.4" fill="#f4bf35"/>
      </svg><!--
      --><span class="word">ickle</span>
    </h1>
    <p class="tagline">대한피클볼협회 공식 대회 플랫폼</p>

    <!-- ill_paddle -->
    <div class="ill-wrap" aria-hidden="true">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="17.5" cy="16" rx="10.5" ry="13" transform="rotate(-32 17.5 16)" stroke="#558d60" stroke-width="1.9"/>
        <path d="M22.5 27 L26 34" stroke="#558d60" stroke-width="1.9" stroke-linecap="round"/>
        <circle cx="30.5" cy="10.5" r="4" stroke="#558d60" stroke-width="1.9"/>
      </svg>
    </div>

    <button type="button" class="btn btn-kakao">카카오로 계속하기</button>
    <button type="button" class="btn btn-apple">Apple로 계속하기</button>

    <p class="hint">처음이시면 자동으로 회원가입이 진행돼요</p>
  </main>
</div>
</body>
</html>
