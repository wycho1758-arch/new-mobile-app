<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채널홈 · 레이아웃 설정 — 와우매니지먼트그룹</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<link rel="stylesheet" href="assets/channel.css">
<style>
  /* 레이아웃 설정 모드: 히어로 편집 액션 */
  .edit-mode-actions { display: flex; gap: 12px; }
  /* 섹션 편집 카드 */
  .section-card {
    display: flex; align-items: center; gap: 12px;
    padding: 16px; margin-top: 16px;
  }
  .section-card .drag-handle { font-size: 18px; color: var(--text-3); cursor: grab; }
  .section-card .section-title-group { display: flex; align-items: baseline; gap: 6px; flex: 1; }
  .section-card .section-name { font-size: 15px; font-weight: 700; }
  .section-card .hint { font-size: 13px; font-weight: 700; color: var(--text-3); cursor: help; }
  .section-card .icon-btn { font-size: 16px; }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="left-group">
      <button class="icon-btn" aria-label="메뉴">☰</button>
      <span class="logo-mark">🏓</span>
      <span class="brand-name">카메라파이 스튜디오</span>
    </div>
    <div class="right-group">
      <button class="icon-btn" aria-label="멤버십">🎫</button>
      <button class="icon-btn" aria-label="알림">🔔</button>
      <button class="icon-btn" aria-label="검색">🔍</button>
      <span class="avatar avatar-danger">WMG</span>
    </div>
  </header>

  <section class="channel-hero">
    <div class="hero-info">
      <div class="name-row">
        <h1>와우매니지먼트그룹</h1>
        <span class="verified-badge">✓</span>
      </div>
      <div class="stats-row">
        <span>팔로워 <b>198</b></span>
        <span>팔로잉 <b>2</b></span>
      </div>
      <p class="intro">와우매니지먼트그룹 피클볼 채널입니다. 함께 성장해요! <span class="more">더보기</span></p>
      <div class="actions-row">
        <span class="layout-btn-wrap">
          <a class="btn btn-secondary" href="channel-layout.html">홈 레이아웃 설정</a>
          <span class="notification-dot"></span>
        </span>
        <div class="edit-mode-actions">
          <a class="btn btn-secondary" href="channel-home.html">취소</a>
          <a class="btn btn-primary" href="channel-home.html">저장</a>
        </div>
      </div>
    </div>
  </section>

  <nav class="channel-tabs">
    <a class="tab active" href="channel-home.html">홈</a>
    <a class="tab" href="channel-match.html">경기</a>
    <a class="tab" href="channel-event.html">이벤트</a>
    <a class="tab" href="channel-results.html">경기 결과</a>
    <a class="tab" href="channel-ranking-doubles.html">팀 랭킹</a>
    <a class="tab" href="channel-team.html">팀</a>
    <a class="tab" href="channel-content.html">콘텐츠</a>
    <a class="tab" href="channel-community.html">커뮤니티</a>
    <a class="tab" href="channel-info.html">정보</a>
  </nav>

  <main class="channel-content">
    <div class="channel-container">

      <button class="btn btn-primary">＋ 섹션 추가</button>

      <div class="card section-card">
        <span class="drag-handle">⠿</span>
        <div class="section-title-group">
          <span class="section-name">커뮤니티</span>
          <span class="hint">?</span>
        </div>
        <button class="icon-btn" aria-label="섹션 삭제">🗑️</button>
        <button class="icon-btn" aria-label="섹션 접기">⌄</button>
      </div>

      <div class="card section-card">
        <span class="drag-handle">⠿</span>
        <div class="section-title-group">
          <span class="section-name">이벤트</span>
        </div>
        <button class="icon-btn" aria-label="섹션 삭제">🗑️</button>
        <button class="icon-btn" aria-label="섹션 접기">⌄</button>
      </div>

    </div>
  </main>

</div>
</body>
</html>
