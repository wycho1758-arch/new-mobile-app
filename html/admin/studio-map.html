<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스튜디오 · 지도 — 카메라파이 스튜디오</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
  html, body, .app { height: 100%; }
  .map-area {
    position: relative; flex: 1; min-height: 640px;
    background: var(--placeholder-fill); overflow: hidden;
  }
  .map-caption {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    color: var(--text-3); font-size: 13px; pointer-events: none;
  }
  .map-toolbar { position: absolute; top: 24px; left: 24px; z-index: 5; }
  .map-tools-right { position: absolute; top: 24px; right: 24px; z-index: 5; display: flex; align-items: center; gap: 8px; }
  .pill-tabs {
    display: flex; gap: 4px; padding: 4px;
    background: var(--surface); border-radius: var(--r-pill); box-shadow: var(--shadow-soft);
  }
  .pill-tabs .seg { padding: 5px 14px; border-radius: var(--r-pill); font-size: 14px; font-weight: 500; color: var(--text-2); }
  .pill-tabs .seg.active { background: var(--brand); color: #fff; font-weight: 700; }
  .search-pill {
    height: 32px; padding: 0 14px; border-radius: var(--r-pill);
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 500;
    display: inline-flex; align-items: center; box-shadow: var(--shadow-soft);
  }
  .layers-btn {
    width: 40px; height: 40px; border-radius: var(--r-pill);
    background: var(--surface); box-shadow: var(--shadow-soft);
    display: inline-flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .map-pin {
    position: absolute; width: 36px; height: 36px; border-radius: var(--r-pill);
    background: var(--accent); color: #fff; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-soft);
  }
  .map-pin .check {
    position: absolute; right: -2px; top: -2px;
    width: 14px; height: 14px; border-radius: var(--r-pill);
    background: var(--brand); color: #fff; font-size: 9px;
    display: flex; align-items: center; justify-content: center;
  }
  .map-pin.wmg {
    width: 64px; height: 64px; background: var(--danger);
    font-size: 13px; font-weight: 700;
  }
  .event-label-card {
    position: absolute; display: flex; align-items: center; gap: 8px;
    background: var(--surface); border-radius: 12px; padding: 10px;
    box-shadow: var(--shadow-card); font-size: 13px; font-weight: 500;
  }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="left-group">
      <button class="icon-btn" aria-label="메뉴">☰</button>
      <span class="logo-mark">🏓</span>
      <span class="brand-name">카메라파이 스튜디오</span>
    </div>
    <div class="right-group">
      <button class="icon-btn" aria-label="내 티켓">🎫</button>
      <button class="icon-btn" aria-label="알림">🔔</button>
      <button class="icon-btn" aria-label="검색">🔍</button>
      <span class="avatar">WMG</span>
    </div>
  </header>

  <div class="map-area">
    <span class="map-caption">지도 영역 (플레이스홀더)</span>

    <div class="map-toolbar">
      <div class="pill-tabs">
        <button class="seg active">대회</button>
        <button class="seg">클럽</button>
        <button class="seg">시설</button>
        <button class="seg">코치</button>
      </div>
    </div>

    <div class="map-tools-right">
      <button class="search-pill">🔍 피클볼 ▾</button>
      <button class="layers-btn" aria-label="레이어">🗂️</button>
    </div>

    <span class="map-pin" style="left:14%; top:22%;">🏓</span>
    <span class="map-pin" style="left:31%; top:44%;">🏓<span class="check">✓</span></span>
    <span class="map-pin" style="left:49%; top:26%;">🏓</span>
    <span class="map-pin" style="left:66%; top:58%;">🏓<span class="check">✓</span></span>
    <span class="map-pin" style="left:80%; top:36%;">🏓</span>
    <span class="map-pin wmg" style="left:45%; top:64%;">WMG</span>

    <div class="event-label-card" style="left:62%; top:49%;">
      <span class="badge badge-danger">진행중</span>
      <span class="badge badge-danger">D+1</span>
      <span>2026 여름 챔피언십 대회</span>
    </div>
  </div>

</div>
</body>
</html>
