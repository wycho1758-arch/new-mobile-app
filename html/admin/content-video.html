<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>콘텐츠 설정 · 동영상 — 카메라파이 스튜디오</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
  .upload-card .card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .upload-card .card-head .name { font-weight: 700; }
  .upload-card .big-number { font-size: 30px; font-weight: 700; margin-left: auto; letter-spacing: -0.02em; }
  .upload-card .cap-row { font-size: 12px; color: var(--text-3); margin-bottom: 8px; }
  .upload-card .cap-foot { font-size: 12px; color: var(--text-3); margin-top: 8px; }
  .list-toolbar { display: flex; align-items: center; gap: 12px; margin: 32px 0 16px; }
  .list-toolbar .count { font-size: 12px; color: var(--text-2); margin-right: auto; }
  .segment {
    display: inline-flex; gap: 4px; padding: 4px;
    background: var(--surface-tint); border-radius: 10px;
  }
  .segment button {
    padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--text-2);
  }
  .segment button.active { background: var(--surface); color: var(--text-1); font-weight: 700; box-shadow: var(--shadow-soft); }
  .sort-select { width: 140px; }
  .pagination-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 24px; }
  .page-arrow {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border-strong); color: var(--text-2);
  }
  .pagination-row .label { font-size: 12px; color: var(--text-3); }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="left-group">
      <button class="icon-btn" aria-label="메뉴">☰</button>
      <span class="logo-mark">P</span>
      <span class="brand-name">카메라파이 스튜디오</span>
    </div>
    <div class="right-group">
      <button class="icon-btn" aria-label="전체화면">⛶</button>
      <button class="icon-btn" aria-label="알림">🔔</button>
      <button class="icon-btn" aria-label="검색">🔍</button>
      <span class="avatar">WTG</span>
    </div>
  </header>

  <div class="body-row">
    <nav class="sidebar">
      <div class="sidebar-title">채널 관리 ⚙</div>
      <a class="menu-item" href="settings-basic.html"><span class="mi-icon">ⓘ</span>기본 정보 설정</a>
      <a class="menu-item" href="team.html"><span class="mi-icon">👥</span>팀 설정<span class="chevron">▾</span></a>
      <a class="menu-item active" href="content-match.html"><span class="mi-icon">🎬</span>콘텐츠 설정</a>
      <a class="menu-item" href="community.html"><span class="mi-icon">💬</span>커뮤니티 설정</a>
      <a class="menu-item" href="board.html"><span class="mi-icon">📋</span>게시판 관리<span class="badge-dot"></span></a>
      <a class="menu-item" href="membership-plan.html"><span class="mi-icon">💳</span>멤버십 설정</a>
    </nav>

    <main class="main">
      <h1 class="page-title">콘텐츠 설정</h1>

      <div class="tab-bar">
        <a class="tab" href="content-match.html">경기</a>
        <a class="tab" href="content-event.html">이벤트</a>
        <a class="tab active" href="content-video.html">동영상</a>
        <a class="tab" href="content-playlist.html">재생목록</a>
        <a class="tab" href="content-subtitle.html">실시간 자막</a>
      </div>

      <h2 class="section-title" style="margin-top:0;">전체 업로드 현황</h2>

      <div class="card-grid cols-2">
        <div class="card upload-card">
          <div class="card-head">
            <span class="name">URL 영상</span>
            <span class="big-number">0</span>
          </div>
          <div class="cap-row">total 0</div>
          <div class="progress"><div class="fill" style="width:0%"></div></div>
          <div class="cap-foot">무제한</div>
        </div>

        <div class="card upload-card">
          <div class="card-head">
            <span class="name">파일 업로드</span>
            <span class="badge badge-gold">PLUS</span>
            <span class="big-number">0</span>
          </div>
          <div class="cap-row">0GB 사용</div>
          <div class="progress"><div class="fill" style="width:0%"></div></div>
          <div class="cap-foot">5GB 가능</div>
        </div>
      </div>

      <div class="list-toolbar">
        <span class="count">총 0개의 동영상</span>
        <div class="segment">
          <button class="active">전체</button>
          <button>URL 영상</button>
          <button>파일 업로드</button>
        </div>
        <select class="select sort-select">
          <option selected>최신순</option>
        </select>
      </div>

      <div class="card">
        <div class="empty-state">
          <div class="empty-icon">📹</div>
          <div class="empty-title">동영상 리스트가 비어 있어요!</div>
          <p class="empty-desc">채널에 동영상을 추가해보세요.</p>
          <button class="btn btn-primary">+ 동영상 추가</button>
        </div>
      </div>

      <div class="pagination-row">
        <button class="page-arrow" aria-label="이전">‹</button>
        <span class="label">0-0 of 0</span>
        <button class="page-arrow" aria-label="다음">›</button>
      </div>
    </main>
  </div>
</div>
</body>
</html>
