<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>요금제 및 멤버십 · 스튜디오 요금제 — 카메라파이 스튜디오</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
  .compare-table th:first-child { font-size: 17px; font-weight: 700; color: var(--text-1); padding: 16px 24px; }
  .compare-table .col-plan { width: 140px; text-align: center; }
  .compare-table td { color: var(--text-2); }
  .compare-table td:first-child { padding-left: 24px; }
  .compare-table .section-row td {
    background: var(--surface-tint); color: var(--text-1);
    font-size: 15px; font-weight: 700; padding: 12px 24px;
  }
  .compare-table .val { text-align: center; }
  .compare-table .val.plus { color: var(--brand-deep); font-weight: 700; }
  .compare-table .no { color: var(--text-3); }
  .compare-table .yes { color: var(--brand); font-weight: 700; }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="left-group">
      <button class="icon-btn" aria-label="메뉴">☰</button>
      <span class="logo-mark">P</span>
      <span class="brand-name">카메라파이 스튜디오</span>
    </div>
    <div class="right-group">
      <button class="icon-btn" aria-label="전체화면">⛶</button>
      <button class="icon-btn" aria-label="알림">🔔</button>
      <button class="icon-btn" aria-label="검색">🔍</button>
      <span class="avatar">WTG</span>
    </div>
  </header>

  <div class="body-row">
    <nav class="sidebar">
      <div class="sidebar-title">채널 관리 ⚙</div>
      <a class="menu-item" href="settings-basic.html"><span class="mi-icon">ⓘ</span>기본 정보 설정</a>
      <a class="menu-item" href="team.html"><span class="mi-icon">👥</span>팀 설정</a>
      <a class="menu-item" href="content-match.html"><span class="mi-icon">🎬</span>콘텐츠 설정</a>
      <a class="menu-item" href="community.html"><span class="mi-icon">💬</span>커뮤니티 설정</a>
      <a class="menu-item" href="board.html"><span class="mi-icon">📋</span>게시판 관리<span class="badge-dot"></span></a>
      <a class="menu-item active" href="membership-plan.html"><span class="mi-icon">💳</span>멤버십 설정</a>
    </nav>

    <main class="main">
      <h1 class="page-title">요금제 및 멤버십</h1>

      <div class="tab-bar">
        <a class="tab" href="membership-plan.html">내 요금제</a>
        <a class="tab" href="membership-billing.html">결제 내역</a>
        <a class="tab active" href="membership-studio-plan.html">스튜디오 요금제</a>
        <a class="tab" href="membership-my.html">내 멤버십</a>
        <a class="tab" href="membership-members.html">회원 관리</a>
      </div>

      <section class="table-card">
        <table class="table compare-table">
          <thead>
            <tr>
              <th>기능</th>
              <th class="col-plan">무료</th>
              <th class="col-plan"><span class="badge badge-green">PLUS</span></th>
            </tr>
          </thead>
          <tbody>
            <tr class="section-row"><td colspan="3">실시간 자막</td></tr>
            <tr>
              <td>자막 언어 수</td>
              <td class="val">1개</td>
              <td class="val plus">5개</td>
            </tr>
            <tr>
              <td>자동 자막</td>
              <td class="val no">✕</td>
              <td class="val yes">✓</td>
            </tr>

            <tr class="section-row"><td colspan="3">경기·스코어보드</td></tr>
            <tr>
              <td>경기 등록</td>
              <td class="val">3개</td>
              <td class="val plus">무제한</td>
            </tr>
            <tr>
              <td>실시간 스코어보드</td>
              <td class="val no">✕</td>
              <td class="val yes">✓</td>
            </tr>

            <tr class="section-row"><td colspan="3">팀 및 선수 관리</td></tr>
            <tr>
              <td>팀 등록 수</td>
              <td class="val">1개</td>
              <td class="val plus">무제한</td>
            </tr>
            <tr>
              <td>선수 명단 관리</td>
              <td class="val yes">✓</td>
              <td class="val yes">✓</td>
            </tr>

            <tr class="section-row"><td colspan="3">채널 멤버십 운영</td></tr>
            <tr>
              <td>멤버십 운영</td>
              <td class="val no">✕</td>
              <td class="val yes">✓</td>
            </tr>
            <tr>
              <td>워터마크 제거</td>
              <td class="val no">✕</td>
              <td class="val yes">✓</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
</div>
</body>
</html>
