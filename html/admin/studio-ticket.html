<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스튜디오 · 내 티켓 — 카메라파이 스튜디오</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
  .studio-main { max-width: 1200px; margin: 0 auto; padding: 40px 24px 64px; }
  .title-row { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
  .title-row h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  .seg-tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-pill); padding: 4px; }
  .seg-tabs .seg { display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: var(--r-pill); font-size: 14px; font-weight: 500; color: var(--text-2); }
  .seg-tabs .seg.active { background: var(--brand); color: #fff; font-weight: 700; }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="left-group">
      <button class="icon-btn" aria-label="메뉴">☰</button>
      <span class="logo-mark">🏓</span>
      <span class="brand-name">카메라파이 스튜디오</span>
    </div>
    <div class="right-group">
      <button class="icon-btn" aria-label="내 티켓">🎫</button>
      <button class="icon-btn" aria-label="알림">🔔</button>
      <button class="icon-btn" aria-label="검색">🔍</button>
      <span class="avatar">WMG</span>
    </div>
  </header>

  <main class="studio-main">

    <div class="title-row">
      <h1>내 티켓</h1>
      <div class="seg-tabs">
        <button class="seg active">이벤트</button>
        <button class="seg">오픈 플레이 <span class="badge badge-blue">BETA</span></button>
      </div>
    </div>

    <section class="card">
      <div class="empty-state">
        <span class="empty-icon">🎫</span>
        <p class="empty-title">아직 보유한 티켓이 없습니다.</p>
        <p class="empty-desc">새로운 이벤트 티켓을 신청해 보세요.</p>
        <a class="btn btn-primary" href="studio-event.html">＋ 이벤트 둘러보기</a>
      </div>
    </section>

  </main>
</div>
</body>
</html>
