<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게시판 관리 — 카메라파이 스튜디오</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .header-row .page-title { margin-bottom: 0; }
  .board-desc { color: var(--text-2); margin-bottom: 24px; }
  .board-empty {
    border: 1.5px dashed var(--border-strong); border-radius: var(--r-card);
    background: var(--surface); padding: 32px 24px; text-align: center;
  }
  .board-empty .empty-title { font-size: 17px; font-weight: 700; }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="left-group">
      <button class="icon-btn" aria-label="메뉴">☰</button>
      <span class="logo-mark">P</span>
      <span class="brand-name">카메라파이 스튜디오</span>
    </div>
    <div class="right-group">
      <button class="icon-btn" aria-label="전체화면">⛶</button>
      <button class="icon-btn" aria-label="알림">🔔</button>
      <button class="icon-btn" aria-label="검색">🔍</button>
      <span class="avatar">WTG</span>
    </div>
  </header>

  <div class="body-row">
    <nav class="sidebar">
      <div class="sidebar-title">채널 관리 ⚙</div>
      <a class="menu-item" href="settings-basic.html"><span class="mi-icon">ⓘ</span>기본 정보 설정</a>
      <a class="menu-item" href="team.html"><span class="mi-icon">👥</span>팀 설정<span class="chevron">▾</span></a>
      <a class="menu-item" href="content-match.html"><span class="mi-icon">🎬</span>콘텐츠 설정</a>
      <a class="menu-item" href="community.html"><span class="mi-icon">💬</span>커뮤니티 설정</a>
      <a class="menu-item active" href="board.html"><span class="mi-icon">📋</span>게시판 관리<span class="badge-dot"></span></a>
      <a class="menu-item" href="membership-plan.html"><span class="mi-icon">💳</span>멤버십 설정</a>
    </nav>

    <main class="main">
      <div class="header-row">
        <h1 class="page-title">게시판 관리</h1>
        <button class="btn btn-accent">+ 새 게시판 만들기</button>
      </div>

      <p class="board-desc">
        채널에 게시판을 만들어 팬들과 소통하세요.<br>
        자유롭게 글을 작성하고 소통할 수 있는 공간을 운영할 수 있습니다.
      </p>

      <div class="board-empty">
        <div class="empty-title">아직 생성된 게시판이 없습니다.</div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
