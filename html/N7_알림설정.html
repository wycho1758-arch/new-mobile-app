<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N7 알림설정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#558d60;
  --ink:#1f2937;
  --gray:#6b7280;
  --border:#e4e7e5;
  --toggle-off:#dde3de;
  --bg:#f7faf8;
  --surface:#ffffff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:#eceff1;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:40px 0;
  min-height:100vh;
}
.phone{
  width:390px;
  background:var(--bg);
  box-shadow:0 8px 32px rgba(15,27,45,.14);
  display:flex;
  flex-direction:column;
  min-height:760px;
  overflow:hidden;
}

/* 상단바 */
header.topbar{
  height:56px;
  background:var(--surface);
  display:flex;
  align-items:center;
  position:relative;
  padding:0 12px;
  flex-shrink:0;
}
.back-btn{
  width:40px;height:40px;
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
header.topbar h1{
  position:absolute;left:50%;transform:translateX(-50%);
  font-size:17px;font-weight:700;color:var(--ink);
}

main{flex:1;padding:16px 20px 24px;}

/* 설정 리스트 */
.setting-list{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
}
.setting-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px 16px;
  height:76px;
  position:relative;
}
.setting-row + .setting-row::before{
  content:"";position:absolute;top:0;left:16px;right:16px;height:1px;background:var(--border);
}
.setting-text{display:flex;flex-direction:column;gap:5px;}
.setting-text .title{font-size:14px;font-weight:700;color:var(--ink);line-height:1.2;}
.setting-text .desc{font-size:12px;font-weight:400;color:var(--gray);line-height:1.2;}

/* 토글 스위치 */
.toggle{
  position:relative;
  width:44px;height:24px;
  flex-shrink:0;
}
.toggle input{
  position:absolute;opacity:0;width:100%;height:100%;
  margin:0;cursor:pointer;
}
.toggle .track{
  display:block;
  width:44px;height:24px;
  border-radius:12px;
  background:var(--toggle-off);
  transition:background .2s;
}
.toggle .track::after{
  content:"";
  position:absolute;top:2px;left:2px;
  width:20px;height:20px;border-radius:50%;
  background:#fff;
  transition:left .2s;
}
.toggle input:checked + .track{background:var(--brand);}
.toggle input:checked + .track::after{left:22px;}
</style>
</head>
<body>
<div class="phone">
  <header class="topbar">
    <button class="back-btn" type="button" aria-label="뒤로가기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1f2937" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 6l-6 6 6 6"/>
      </svg>
    </button>
    <h1>알림 설정</h1>
  </header>

  <main>
    <section class="setting-list">
      <div class="setting-row">
        <div class="setting-text">
          <span class="title">경기 호출 알림</span>
          <span class="desc">내 경기 호출 시 알려드려요</span>
        </div>
        <label class="toggle">
          <input type="checkbox" checked aria-label="경기 호출 알림">
          <span class="track"></span>
        </label>
      </div>
      <div class="setting-row">
        <div class="setting-text">
          <span class="title">대회 공지 알림</span>
          <span class="desc">참가 대회의 새 공지를 알려드려요</span>
        </div>
        <label class="toggle">
          <input type="checkbox" checked aria-label="대회 공지 알림">
          <span class="track"></span>
        </label>
      </div>
      <div class="setting-row">
        <div class="setting-text">
          <span class="title">파트너 초대 알림</span>
          <span class="desc">복식 파트너 초대/수락 알림</span>
        </div>
        <label class="toggle">
          <input type="checkbox" checked aria-label="파트너 초대 알림">
          <span class="track"></span>
        </label>
      </div>
      <div class="setting-row">
        <div class="setting-text">
          <span class="title">결제/환불 알림</span>
          <span class="desc">결제 완료/환불 처리 알림</span>
        </div>
        <label class="toggle">
          <input type="checkbox" checked aria-label="결제/환불 알림">
          <span class="track"></span>
        </label>
      </div>
      <div class="setting-row">
        <div class="setting-text">
          <span class="title">마케팅 정보 수신</span>
          <span class="desc">이벤트·혜택 정보 수신 (선택)</span>
        </div>
        <label class="toggle">
          <input type="checkbox" aria-label="마케팅 정보 수신">
          <span class="track"></span>
        </label>
      </div>
    </section>
  </main>
</div>
</body>
</html>
