<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N14 이의 제기 완료</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#558d60;
    --ink:#1f2937;
    --bg:#f7faf8;
    --surface:#ffffff;
    --line:#e4e7e5;
    --muted:#6b7280;
    --faint:#9ca3af;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Noto Sans KR',sans-serif;
    background:#e9ecef;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px 0;
  }
  .screen{
    width:390px;
    min-height:760px;
    background:var(--bg);
    box-shadow:0 12px 40px rgba(15,27,45,.14);
    border-radius:8px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    padding:96px 20px 48px;
  }
  .check-circle{
    width:80px;height:80px;
    border-radius:50%;
    background:var(--brand);
    margin:0 auto;
    display:flex;align-items:center;justify-content:center;
  }
  .headline{
    margin-top:24px;
    text-align:center;
    font-size:22px;font-weight:900;color:var(--ink);
  }
  .subtext{
    margin-top:10px;
    text-align:center;
    font-size:14px;font-weight:500;color:var(--muted);
  }
  /* summary card */
  .summary-card{
    margin-top:47px;
    background:var(--surface);
    border-radius:16px;
    padding:18px 20px 22px;
  }
  .summary-card .title{
    font-size:15px;font-weight:700;color:var(--ink);
  }
  .summary-card .meta{
    margin-top:8px;
    font-size:12px;font-weight:400;color:var(--muted);
  }
  .summary-grid{
    margin-top:18px;
    display:flex;
  }
  .summary-grid .col-left{flex:0 0 180px;}
  .summary-grid .col-right{flex:1;}
  .field-label{
    font-size:11px;font-weight:400;color:var(--faint);
  }
  .field-score{
    margin-top:3px;
    font-size:20px;font-weight:900;color:var(--ink);
  }
  .field-value{
    margin-top:5px;
    font-size:13px;font-weight:500;color:var(--ink);
  }
  .field-block{margin-top:22px;}
  /* buttons */
  .btn-primary{
    margin-top:32px;
    width:100%;height:52px;
    background:var(--brand);
    border:none;border-radius:14px;
    font-family:'Noto Sans KR',sans-serif;
    font-size:16px;font-weight:700;color:var(--surface);
    cursor:pointer;
  }
  .btn-secondary{
    margin-top:12px;
    width:100%;height:52px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    font-family:'Noto Sans KR',sans-serif;
    font-size:16px;font-weight:700;color:var(--ink);
    cursor:pointer;
  }
</style>
</head>
<body>
  <div class="screen">
    <main>
      <div class="check-circle" role="img" aria-label="접수 완료">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 20.5L16.5 28L31 13" stroke="#ffffff" stroke-width="4.33" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <h1 class="headline">이의 제기가 접수됐어요</h1>
      <p class="subtext">주최측 확인 후 24시간 내 결과가 조정돼요</p>

      <section class="summary-card">
        <p class="title">2026 협회장배 전국오픈</p>
        <p class="meta">남자복식 · vs 박지훈/정수빈</p>
        <div class="summary-grid">
          <div class="col-left">
            <p class="field-label">제출한 결과</p>
            <p class="field-score">11:7, 9:11, 11:8</p>
          </div>
          <div class="col-right">
            <p class="field-label">이의 제기 사유</p>
            <p class="field-value">2세트 점수가 실제와 달라요</p>
          </div>
        </div>
        <div class="field-block">
          <p class="field-label">처리 예정</p>
          <p class="field-value">24시간 이내 확인</p>
        </div>
      </section>

      <button class="btn-primary">내 경기로 돌아가기</button>
      <button class="btn-secondary">홈으로</button>
    </main>
  </div>
</body>
</html>
