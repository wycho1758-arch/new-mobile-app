<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N2 초대장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#558d60;
    --brand-dark:#3f6b48;
    --brand-light:#e9f1ea;
    --brand-soft:#a8c7ae;
    --code-green:#6fcf7c;
    --ink:#1f2937;
    --ink-2:#374151;
    --divider-dark:#4b5563;
    --muted:#6b7280;
    --border:#e4e7e5;
    --bg:#f7faf8;
    --surface:#ffffff;
    --kakao:#fee500;
    --pending:#f4bf35;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"Noto Sans KR",sans-serif;
    background:#e8ecef;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:40px 0;
  }
  .phone{
    width:390px;
    min-height:760px;
    background:var(--bg);
    border-radius:20px;
    box-shadow:0 16px 40px rgba(15,27,45,.14);
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  header.topbar{
    position:relative;
    height:56px;
    background:var(--surface);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .back-btn{
    position:absolute;
    left:12px;
    top:8px;
    width:40px;
    height:40px;
    border:none;
    background:transparent;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--ink);
    cursor:pointer;
  }
  .topbar-title{
    font-size:17px;
    font-weight:700;
    color:var(--ink);
  }
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 20px 40px;
  }
  .ticket-card{
    width:100%;
    min-height:300px;
    background:var(--ink);
    border-radius:20px;
    padding:24px 20px 30px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .ticket-label{
    font-size:13px;
    font-weight:700;
    color:var(--brand-soft);
  }
  .ticket-title{
    margin-top:10px;
    font-size:18px;
    font-weight:900;
    color:var(--surface);
  }
  .ticket-sub{
    margin-top:10px;
    font-size:12px;
    font-weight:400;
    color:var(--brand-soft);
  }
  .avatar-row{
    margin-top:16px;
    display:flex;
    gap:34px;
  }
  .avatar-col{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    width:64px;
  }
  .avatar{
    width:48px;
    height:48px;
    border-radius:24px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .avatar-me{
    background:var(--brand);
    color:var(--surface);
  }
  .avatar-empty{
    background:var(--ink-2);
    color:var(--brand-soft);
  }
  .avatar-name{
    font-size:12px;
    font-weight:700;
    color:var(--surface);
  }
  .avatar-status{
    font-size:11px;
    font-weight:500;
    color:var(--brand-soft);
    white-space:nowrap;
  }
  .dashed-div{
    width:310px;
    margin-top:16px;
    border:none;
    border-top:1px dashed var(--divider-dark);
  }
  .code-box{
    margin-top:28px;
    width:200px;
    height:48px;
    border-radius:10px;
    background:var(--ink-2);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .code-box span{
    font-size:18px;
    font-weight:900;
    letter-spacing:1px;
    color:var(--code-green);
  }
  button.btn{
    width:100%;
    height:52px;
    border-radius:14px;
    border:none;
    font-family:inherit;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
  }
  .btn-kakao{
    margin-top:24px;
    background:var(--kakao);
    color:var(--ink);
  }
  .btn-copy{
    margin-top:12px;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--ink);
  }
  .status-row{
    width:100%;
    margin-top:12px;
    height:60px;
    border-radius:14px;
    background:var(--brand-light);
    display:flex;
    align-items:center;
    padding:0 16px;
  }
  .pending-badge{
    flex-shrink:0;
    height:28px;
    padding:0 13px;
    border-radius:14px;
    background:var(--pending);
    display:flex;
    align-items:center;
    font-size:11px;
    font-weight:700;
    color:var(--surface);
  }
  .status-text{
    flex:1;
    text-align:center;
    font-size:12px;
    font-weight:700;
    color:var(--brand-dark);
  }
  .resend-link{
    margin-top:22px;
    border:none;
    background:transparent;
    font-family:inherit;
    font-size:13px;
    font-weight:700;
    color:var(--brand);
    cursor:pointer;
  }
</style>
</head>
<body>
  <div class="phone">
    <header class="topbar">
      <button type="button" class="back-btn" aria-label="뒤로 가기">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1 class="topbar-title">초대장</h1>
    </header>

    <main>
      <section class="ticket-card">
        <p class="ticket-label">피클볼 대회 파트너 초대장</p>
        <p class="ticket-title">2026 협회장배 전국오픈</p>
        <p class="ticket-sub">남자복식 · 8월 9일 (토)</p>

        <div class="avatar-row">
          <div class="avatar-col">
            <div class="avatar avatar-me">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/>
                <path d="M4.5 20c1.1-3.7 3.9-6 7.5-6s6.4 2.3 7.5 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </div>
            <span class="avatar-name">김민준</span>
          </div>
          <div class="avatar-col">
            <div class="avatar avatar-empty">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 3.75v10.5M3.75 9h10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
            <span class="avatar-status">파트너 대기중</span>
          </div>
        </div>

        <hr class="dashed-div">

        <div class="code-box"><span>PICKLE-7X9K2</span></div>
      </section>

      <button type="button" class="btn btn-kakao">카카오톡으로 초대하기</button>
      <button type="button" class="btn btn-copy">초대 링크 복사하기</button>

      <div class="status-row">
        <span class="pending-badge">대기중</span>
        <span class="status-text">유효기간 72시간 · 42:18:05 남음</span>
      </div>

      <button type="button" class="resend-link">링크 재발송 (최대 3회)</button>
    </main>
  </div>
</body>
</html>
