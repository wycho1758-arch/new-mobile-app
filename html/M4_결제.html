<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4 결제</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#558D60;
  --brand-deep:#3F6B48;
  --brand-soft:#E9F1EA;
  --ink:#1F2937;
  --bg:#F7FAF8;
  --surface:#FFFFFF;
  --border:#E4E7E5;
  --muted:#6B7280;
  --faint:#9CA3AF;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:#E3E7EA;
  display:flex;justify-content:center;align-items:flex-start;
  padding:40px 0;
}
.phone{
  width:390px;min-height:844px;background:var(--bg);
  box-shadow:0 12px 40px rgba(15,27,45,.18);
  border-radius:8px;overflow:hidden;
  display:flex;flex-direction:column;
}
/* ── Topbar ───────────────────────── */
.topbar{
  position:relative;height:56px;background:var(--surface);
  display:flex;align-items:center;justify-content:center;flex:none;
}
.topbar h1{font-size:17px;font-weight:700;color:var(--ink)}
.topbar .back{
  position:absolute;left:12px;top:8px;width:40px;height:40px;
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
main{flex:1;display:flex;flex-direction:column;padding:16px 20px 20px}
/* ── 주문 카드 ────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px}
.order-card{padding:18px 16px 0}
.order-card .t{font-size:15px;font-weight:700;color:var(--ink)}
.order-card .s{margin-top:8px;font-size:12px;color:var(--muted)}
.order-card .rule{height:1px;background:var(--border);margin:14px 0 0}
.o-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.o-row .n{font-size:13px;color:var(--ink)}
.o-row .p{font-size:13px;font-weight:500;color:var(--ink)}
.o-total{display:flex;align-items:center;justify-content:space-between;padding:10px 0 14px;margin-top:12px}
.o-total .n{font-size:13px;font-weight:700;color:var(--ink)}
.o-total .p{font-size:18px;font-weight:700;color:var(--brand)}
/* ── 환불 규정 ────────────────────── */
.refund-box{
  margin-top:18px;background:var(--brand-soft);border-radius:12px;
  padding:14px 16px;
}
.refund-box .rt{font-size:12px;font-weight:700;color:var(--brand-deep)}
.refund-box .rd{margin-top:7px;font-size:11.5px;color:var(--muted)}
/* ── 결제수단 ─────────────────────── */
.pay-card{margin-top:18px;display:flex;align-items:flex-start;padding:22px 16px;min-height:64px}
.radio{width:20px;height:20px;border-radius:10px;background:var(--brand);flex:none;margin-top:2px}
.pay-card .body{margin-left:12px;display:flex;flex-direction:column;gap:4px}
.pay-card .n{font-size:14px;font-weight:700;color:var(--ink)}
.pay-card .d{font-size:11px;color:var(--faint)}
.divider{height:1px;background:var(--border);margin:24px 0 0}
/* ── 총 결제금액 ──────────────────── */
.total-sec{margin-top:auto;padding-top:40px}
.total-sec .l{font-size:12px;color:var(--faint)}
.total-sec .v{margin-top:4px;font-size:26px;font-weight:900;color:var(--ink)}
/* ── CTA ──────────────────────────── */
.cta-bar{background:var(--surface);padding:16px 20px;flex:none}
.cta-bar .cta{
  width:100%;height:52px;border:none;border-radius:14px;
  background:var(--brand);color:#fff;font-size:16px;font-weight:700;
  font-family:inherit;cursor:pointer;
}
</style>
</head>
<body>
<div class="phone">
  <header class="topbar">
    <button class="back" aria-label="뒤로가기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 6L9 12L15 18" stroke="#1F2937" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <h1>결제</h1>
  </header>

  <main>
    <!-- 주문 내역 -->
    <section class="card order-card">
      <p class="t">2026 협회장배 전국오픈</p>
      <p class="s">남자복식 · 대표 2인 결제</p>
      <div class="rule"></div>
      <div class="o-row">
        <span class="n">참가자 1 (대표) · 김민준</span>
        <span class="p">30,000원</span>
      </div>
      <div class="o-row">
        <span class="n">참가자 2 (파트너) · 이서연</span>
        <span class="p">30,000원</span>
      </div>
      <div class="rule" style="margin-top:16px"></div>
      <div class="o-total">
        <span class="n">총 결제금액</span>
        <span class="p">60,000원</span>
      </div>
    </section>

    <!-- 환불 규정 -->
    <aside class="refund-box">
      <p class="rt">환불 규정 (신청시점 기준)</p>
      <p class="rd">대회 3일 전까지 100% · 3일 이내 불가 · 주최측 취소 시 전액환불</p>
    </aside>

    <!-- 결제수단 -->
    <section class="card pay-card">
      <span class="radio" role="radio" aria-checked="true"></span>
      <div class="body">
        <span class="n">카드 결제 (PG)</span>
        <span class="d">신청 즉시 결제되며 멱등성 키로 중복결제를 방지합니다</span>
      </div>
    </section>

    <div class="divider"></div>

    <!-- 총 결제금액 -->
    <section class="total-sec">
      <p class="l">총 결제금액</p>
      <p class="v">60,000원</p>
    </section>
  </main>

  <!-- CTA -->
  <footer class="cta-bar">
    <button class="cta">60,000원 결제하기</button>
  </footer>
</div>
</body>
</html>
