<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2 마이페이지</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#558d60;
  --brand-dark:#3f6b48;
  --brand-tint:#e9f1ea;
  --ink:#1f2937;
  --gray:#6b7280;
  --gray-light:#9ca3af;
  --border:#e4e7e5;
  --danger:#d14343;
  --danger-tint:#fdeded;
  --loss:#ed7040;
  --bg:#f7faf8;
  --surface:#ffffff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:#eceff1;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:40px 0;
  min-height:100vh;
}
.phone{
  width:390px;
  background:var(--bg);
  border-radius:0;
  box-shadow:0 8px 32px rgba(15,27,45,.14);
  display:flex;
  flex-direction:column;
  min-height:900px;
  overflow:hidden;
}
header.page-head{padding:20px 20px 0;}
header.page-head h1{font-size:20px;font-weight:900;color:var(--ink);line-height:1.2;}
main{flex:1;padding:16px 20px 24px;display:flex;flex-direction:column;gap:16px;}

/* 프로필 카드 */
.profile-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:24px;
  display:flex;
  align-items:flex-start;
  gap:16px;
  position:relative;
}
.avatar{
  width:72px;height:72px;border-radius:50%;
  background:var(--brand-tint);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.profile-info{display:flex;flex-direction:column;align-items:flex-start;gap:8px;padding-top:2px;}
.profile-info .name{font-size:18px;font-weight:700;color:var(--ink);line-height:1.2;}
.dupr-badge{
  background:var(--brand-tint);
  border-radius:12px;
  padding:5px 12px;
  font-size:12px;font-weight:700;color:var(--brand-dark);
  line-height:1.2;
}
.profile-info .club{font-size:12px;font-weight:400;color:var(--gray);}
.edit-btn{
  position:absolute;top:24px;right:24px;
  width:44px;height:32px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  font-family:inherit;
  font-size:12px;font-weight:700;color:var(--gray);
  cursor:pointer;
}

/* 통계 */
.stats-row{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  height:68px;
  display:flex;
  align-items:center;
}
.stat{flex:1;display:flex;flex-direction:column;align-items:center;gap:0;}
.stat .num{font-size:20px;font-weight:900;line-height:1.2;color:var(--ink);}
.stat .num.win{color:var(--brand);}
.stat .num.loss{color:var(--loss);}
.stat .label{font-size:11px;font-weight:400;color:var(--gray-light);line-height:1.2;margin-top:2px;}
.stat-div{width:1px;height:32px;background:var(--border);}

/* 메뉴 */
nav.menu-list{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.menu-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;
  height:64px;
  text-decoration:none;
  cursor:pointer;
  background:none;border:none;
  font-family:inherit;
  text-align:left;
}
.menu-item + .menu-item{position:relative;}
.menu-item + .menu-item::before{
  content:"";position:absolute;top:0;left:16px;right:16px;height:1px;background:var(--border);
}
.menu-icon{
  width:36px;height:36px;border-radius:10px;
  background:var(--brand-tint);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.menu-icon.danger{background:var(--danger-tint);}
.menu-item .label{font-size:14px;font-weight:700;color:var(--ink);}
.menu-item .label.danger{color:var(--danger);}

/* 탭바 */
nav.tabbar{
  background:var(--surface);
  height:80px;
  display:flex;
  border-top:1px solid var(--border);
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
  background:none;border:none;cursor:pointer;font-family:inherit;
  padding-top:2px;
}
.tab .tab-label{font-size:11px;font-weight:500;color:var(--gray-light);line-height:1.2;}
.tab.active .tab-label{color:var(--brand);}
</style>
</head>
<body>
<div class="phone">
  <header class="page-head">
    <h1>마이</h1>
  </header>

  <main>
    <!-- 프로필 카드 -->
    <section class="profile-card">
      <div class="avatar">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#558d60" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="12" r="6"/>
          <path d="M6.75 30c0-6.2 5-9 11.25-9s11.25 2.8 11.25 9"/>
        </svg>
      </div>
      <div class="profile-info">
        <span class="name">김민준</span>
        <span class="dupr-badge">DUPR 4.2</span>
        <span class="club">송파피클볼클럽</span>
      </div>
      <button class="edit-btn" type="button">수정</button>
    </section>

    <!-- 통계 -->
    <section class="stats-row">
      <div class="stat">
        <span class="num">12</span>
        <span class="label">참가 대회</span>
      </div>
      <div class="stat-div"></div>
      <div class="stat">
        <span class="num win">34</span>
        <span class="label">승</span>
      </div>
      <div class="stat-div"></div>
      <div class="stat">
        <span class="num loss">18</span>
        <span class="label">패</span>
      </div>
    </section>

    <!-- 메뉴 리스트 -->
    <nav class="menu-list">
      <button class="menu-item" type="button">
        <span class="menu-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#558d60" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 15h6.75"/>
            <path d="M12.4 2.6a1.9 1.9 0 0 1 2.7 2.7L5.6 14.8l-3.35.85.85-3.35L12.4 2.6z"/>
          </svg>
        </span>
        <span class="label">프로필 수정</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#558d60" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2.63" y="3.75" width="12.75" height="12" rx="2"/>
            <path d="M2.63 7.13h12.75"/>
          </svg>
        </span>
        <span class="label">내 경기 기록</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#558d60" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1.88" y="3.75" width="14.25" height="10.5" rx="2"/>
            <path d="M1.88 7.5h14.25"/>
          </svg>
        </span>
        <span class="label">결제 내역</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#558d60" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 1.5l2.1 4.4 4.65.6-3.4 3.3.85 4.7L9 12.2l-4.2 2.3.85-4.7-3.4-3.3 4.65-.6L9 1.5z"/>
          </svg>
        </span>
        <span class="label">DUPR 정보 관리</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#558d60" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13.9 6.4a4.9 4.9 0 0 0-9.8 0c0 3.4-1.85 4.7-1.85 4.7h13.5s-1.85-1.3-1.85-4.7"/>
            <path d="M7.73 16.1a1.47 1.47 0 0 0 2.55 0"/>
          </svg>
        </span>
        <span class="label">알림 설정</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="6.75" fill="#558d60" stroke="#558d60" stroke-width="1.35"/>
            <path d="M7.13 6.9a1.9 1.9 0 1 1 2.7 1.75c-.55.25-.83.7-.83 1.25" stroke="#fff" stroke-width="1.35" stroke-linecap="round" fill="none"/>
            <circle cx="9" cy="12.75" r=".85" fill="#fff"/>
          </svg>
        </span>
        <span class="label">고객센터</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-icon danger">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#d14343" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6.75 2.25H3.6a1.35 1.35 0 0 0-1.35 1.35v10.8a1.35 1.35 0 0 0 1.35 1.35h3.15"/>
            <path d="M11.25 12.75L15.75 9l-4.5-3.75M15.75 9h-9"/>
          </svg>
        </span>
        <span class="label danger">로그아웃</span>
      </button>
    </nav>
  </main>

  <!-- 하단 탭바 -->
  <nav class="tabbar">
    <button class="tab" type="button">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="8.5"/>
        <path d="M14.9 9.1l-1.6 4.2-4.2 1.6 1.6-4.2 4.2-1.6z"/>
      </svg>
      <span class="tab-label">탐색</span>
    </button>
    <button class="tab" type="button">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3.5" y="5" width="17" height="16" rx="2.5"/>
        <path d="M3.5 10h17M8 3v4M16 3v4"/>
      </svg>
      <span class="tab-label">내 경기</span>
    </button>
    <button class="tab" type="button">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18.5 8.5a6.5 6.5 0 0 0-13 0c0 4.6-2.5 6.3-2.5 6.3h18s-2.5-1.7-2.5-6.3"/>
        <path d="M10.3 21a1.95 1.95 0 0 0 3.4 0"/>
      </svg>
      <span class="tab-label">알림</span>
    </button>
    <button class="tab active" type="button">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#558d60" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4.5 20c0-3.7 3.3-6 7.5-6s7.5 2.3 7.5 6"/>
      </svg>
      <span class="tab-label">마이</span>
    </button>
  </nav>
</div>
</body>
</html>
