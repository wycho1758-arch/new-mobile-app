<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M0B 회원가입 — Happickle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#558d60;
    --ink:#1f2937;
    --live:#F43F5E;
    --bg:#f7faf8;
    --surface:#fff;
    --muted:#6b7280;
    --faint:#9ca3af;
    --line:#e4e7e5;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Noto Sans KR',sans-serif;
    margin:0;
    background:var(--bg);
  }
  .phone{
    width:100%;
    max-width:480px;
    margin:0 auto;
    min-height:100dvh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
  }
  /* 상단 바 */
  .topbar{
    height:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    flex-shrink:0;
  }
  .back-btn{
    position:absolute;
    left:12px;
    top:8px;
    width:40px;
    height:40px;
    border:none;
    background:transparent;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .topbar h1{
    font-size:17px;
    font-weight:700;
    color:var(--ink);
  }
  main{padding:0 20px 32px}
  .section-title{
    font-size:15px;
    font-weight:900;
    color:var(--ink);
    margin-top:16px;
    margin-bottom:14px;
  }
  .field{
    width:100%;
    height:52px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    padding:0 18px;
    font-family:'Noto Sans KR',sans-serif;
    font-size:14px;
    font-weight:400;
    color:var(--ink);
    display:block;
  }
  .field::placeholder{color:var(--faint)}
  .field + .field{margin-top:8px}
  .divider{
    height:1px;
    background:var(--line);
    margin-top:20px;
  }
  /* 성별 선택 */
  .gender-row{
    display:flex;
    gap:8px;
    margin-top:8px;
  }
  .gender-btn{
    flex:1;
    height:44px;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--surface);
    font-family:'Noto Sans KR',sans-serif;
    font-size:14px;
    font-weight:700;
    color:var(--muted);
    cursor:pointer;
  }
  .gender-btn.selected{
    background:var(--brand);
    border-color:var(--brand);
    color:#fff;
  }
  .field-hint{
    font-size:11px;
    font-weight:400;
    color:var(--faint);
    margin:4px 0 7px 2px;
  }
  /* 약관 동의 */
  .agree-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:12px;
  }
  .agree-row.all{margin-top:14px}
  .checkbox{
    width:20px;
    height:20px;
    border-radius:5px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .checkbox.lg{width:22px;height:22px;border-radius:6px}
  .checkbox.dark{background:var(--ink)}
  .checkbox.on{background:var(--brand)}
  .checkbox.off{background:var(--line)}
  .agree-label{font-size:13px;font-weight:400;color:var(--ink)}
  .agree-label.strong{font-size:14px;font-weight:700}
  .agree-label.optional{color:var(--faint)}
  /* 하단 CTA */
  .cta-bar{
    margin-top:auto;
    position:sticky;
    bottom:0;
    background:var(--surface);
    padding:16px 20px calc(16px + env(safe-area-inset-bottom));
    flex-shrink:0;
  }
  .cta-btn{
    width:100%;
    height:52px;
    border:none;
    border-radius:14px;
    background:var(--brand);
    color:#fff;
    font-family:'Noto Sans KR',sans-serif;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
  }
</style>
</head>
<body>
<div class="phone">
  <header class="topbar">
    <button type="button" class="back-btn" aria-label="뒤로가기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 6 L9 12 L15 18" stroke="#2b1c15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1>회원가입</h1>
  </header>

  <main>
    <!-- 계정 정보 -->
    <h2 class="section-title">계정 정보</h2>
    <input class="field" type="email" placeholder="이메일">
    <input class="field" type="password" placeholder="비밀번호 (8자 이상)">
    <input class="field" type="password" placeholder="비밀번호 확인">

    <div class="divider"></div>

    <!-- 기본 정보 -->
    <h2 class="section-title" style="margin-top:15px">기본 정보</h2>
    <input class="field" type="text" placeholder="이름">
    <input class="field" type="tel" placeholder="연락처 (010-0000-0000)">

    <div class="gender-row">
      <button type="button" class="gender-btn selected">남성</button>
      <button type="button" class="gender-btn">여성</button>
    </div>

    <input class="field" type="text" placeholder="생년월일 또는 연령대" style="margin-top:8px">
    <input class="field" type="text" placeholder="DUPR ID (선택)" style="margin-top:8px">
    <p class="field-hint">DUPR 프로필 스크린샷을 첨부하면 관리자 확인이 빨라져요</p>
    <input class="field" type="text" placeholder="소속 · 클럽 (선택)">

    <div class="divider"></div>

    <!-- 약관 동의 -->
    <h2 class="section-title" style="margin-top:15px;margin-bottom:0">약관 동의</h2>
    <div class="agree-row all">
      <span class="checkbox lg dark" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.9 7.2 L5.8 10 L11.1 4.1" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="agree-label strong">전체 동의합니다</span>
    </div>

    <div class="divider" style="margin-top:12px"></div>

    <div class="agree-row">
      <span class="checkbox on" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.9 7.2 L5.8 10 L11.1 4.1" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="agree-label">[필수] 개인정보 수집 · 이용에 동의</span>
    </div>
    <div class="agree-row">
      <span class="checkbox on" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.9 7.2 L5.8 10 L11.1 4.1" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="agree-label">[필수] 이용약관 동의</span>
    </div>
    <div class="agree-row">
      <span class="checkbox off" aria-hidden="true"></span>
      <span class="agree-label optional">[선택] 마케팅 정보 수신 동의</span>
    </div>
  </main>

  <footer class="cta-bar">
    <button type="button" class="cta-btn">가입 완료하기</button>
  </footer>
</div>
</body>
</html>
