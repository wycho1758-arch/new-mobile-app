<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>M6 알림</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#558d60;
  --ink:#1f2937;
  --bg:#f7faf8;
  --surface:#ffffff;
  --border:#e4e7e5;
  --gray:#9ca3af;
  --gray-d:#6b7280;
  --green-lt:#e9f1ea;
  --gold:#f4bf35;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#e9edef;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:40px 16px;
  font-family:'Noto Sans KR',sans-serif;
  color:var(--ink);
}
.phone{
  width:390px;
  min-height:844px;
  background:var(--bg);
  border-radius:12px;
  box-shadow:0 16px 48px rgba(15,27,45,.16);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
header{
  background:var(--surface);
  height:100px;
  padding:20px 20px 0;
}
header h1{font-size:20px;font-weight:900;line-height:24px}
main{flex:1;padding:16px 20px 0;display:flex;flex-direction:column;gap:12px}
.noti{
  position:relative;
  border-radius:14px;
  padding:16px;
  display:flex;
  gap:12px;
  min-height:84px;
  background:var(--surface);
  border:1px solid var(--border);
}
.noti--unread{background:var(--green-lt);border-color:var(--green-lt)}
.icon-bg{
  flex:none;width:44px;height:44px;border-radius:22px;
  display:flex;align-items:center;justify-content:center;
}
.icon-bg--brand{background:var(--brand)}
.icon-bg--gold{background:var(--gold)}
.icon-bg--gray{background:var(--gray-d)}
.icon-bg svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.65;stroke-linecap:round;stroke-linejoin:round}
.noti .txt{min-width:0;padding-top:0}
.noti .title{font-size:14px;font-weight:700;color:var(--ink);line-height:17px;margin-top:-2px}
.noti .body{font-size:12px;color:var(--gray-d);line-height:14px;margin-top:5px;max-width:258px}
.noti--unread .body{line-height:14px}
.noti .time{font-size:11px;color:var(--gray);line-height:13px;margin-top:8px}
.dot{
  position:absolute;top:16px;right:16px;
  width:8px;height:8px;border-radius:4px;background:var(--brand);
}
nav.tabbar{
  background:var(--surface);
  border-top:1px solid var(--border);
  height:80px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  padding-top:45px;
}
nav.tabbar a{
  text-align:center;text-decoration:none;
  font-size:11px;font-weight:500;color:var(--gray);line-height:13px;
}
nav.tabbar a.on{color:var(--brand)}
</style>
</head>
<body>
<div class="phone">
  <header>
    <h1>알림</h1>
  </header>

  <main>
    <article class="noti noti--unread">
      <span class="icon-bg icon-bg--brand" aria-hidden="true">
        <!-- 확성기 -->
        <svg viewBox="0 0 22 22"><path d="M2.75 9v4l8.25 4.5V4.5L2.75 9z"/><path d="M11 6.5a5.5 5.5 0 0 1 0 9"/><path d="M16.5 8.25v5.5"/></svg>
      </span>
      <div class="txt">
        <p class="title">대회 마감 임박! 오늘까지 신청하세요</p>
        <p class="body">2026 협회장배 전국오픈 · 남자복식 접수가 오늘 마감됩니다</p>
        <p class="time">10분 전</p>
      </div>
      <span class="dot" aria-label="읽지 않음"></span>
    </article>

    <article class="noti">
      <span class="icon-bg icon-bg--brand" aria-hidden="true">
        <!-- 시계 -->
        <svg viewBox="0 0 22 22"><circle cx="11" cy="11" r="8.25"/><path d="M11 6.42v4.58l3.21 1.83"/></svg>
      </span>
      <div class="txt">
        <p class="title">다음 경기가 호출되었어요</p>
        <p class="body">코트 3에서 김민준님의 경기가 곧 시작됩니다</p>
        <p class="time">1시간 전</p>
      </div>
    </article>

    <article class="noti">
      <span class="icon-bg icon-bg--gold" aria-hidden="true">
        <!-- 파트너 -->
        <svg viewBox="0 0 22 22" style="stroke-width:1.56"><circle cx="7.3" cy="8.3" r="2.9"/><circle cx="15.6" cy="8.3" r="2.9"/><path d="M2.3 18.3c.9-2.7 2.9-4 5-4h7.4c2.1 0 4.1 1.3 5 4"/></svg>
      </span>
      <div class="txt">
        <p class="title">파트너 초대가 도착했어요</p>
        <p class="body">이서연님이 파트너 초대를 수락했습니다</p>
        <p class="time">어제</p>
      </div>
    </article>

    <article class="noti">
      <span class="icon-bg icon-bg--gray" aria-hidden="true">
        <!-- 카드 -->
        <svg viewBox="0 0 22 22"><rect x="2.3" y="4.6" width="17.4" height="12.8" rx="2"/><path d="M2.3 9.17h17.4"/></svg>
      </span>
      <div class="txt">
        <p class="title">결제가 완료되었어요</p>
        <p class="body">2026 협회장배 전국오픈 참가비 30,000원</p>
        <p class="time">7월 30일</p>
      </div>
    </article>
  </main>

  <nav class="tabbar">
    <a href="#">탐색</a>
    <a href="#">내 경기</a>
    <a href="#" class="on">알림</a>
    <a href="#">마이</a>
  </nav>
</div>
</body>
</html>
