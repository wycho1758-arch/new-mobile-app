<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>M5 내 경기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#558d60;
  --ink:#1f2937;
  --bg:#f7faf8;
  --surface:#ffffff;
  --border:#e4e7e5;
  --gray:#9ca3af;
  --gray-d:#6b7280;
  --green-lt:#e9f1ea;
  --green-deep:#3f6b48;
  --green-soft:#a8c7ae;
  --gold:#f4bf35;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#e9edef;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:40px 16px;
  font-family:'Noto Sans KR',sans-serif;
  color:var(--ink);
}
.phone{
  width:390px;
  min-height:900px;
  background:var(--bg);
  border-radius:12px;
  box-shadow:0 16px 48px rgba(15,27,45,.16);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
/* header */
header{
  background:var(--surface);
  padding:20px 20px 8px;
}
header h1{font-size:20px;font-weight:900;line-height:24px}
.tabs{display:flex;gap:8px;margin-top:16px}
.tab{
  height:32px;border-radius:16px;border:none;
  display:inline-flex;align-items:center;justify-content:center;
  font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
}
.tab--on{width:90px;background:var(--brand);color:#fff}
.tab--off{width:70px;background:var(--green-lt);color:var(--green-deep)}
/* main */
main{flex:1;padding:16px 20px 0}
/* live card */
.live-card{
  background:var(--ink);
  border-radius:18px;
  padding:16px;
  min-height:164px;
}
.live-badge{
  width:56px;height:26px;border-radius:13px;
  background:var(--brand);color:#fff;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
}
.live-meta{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-top:14px;
}
.live-meta .next{font-size:13px;font-weight:500;color:var(--green-soft)}
.live-meta .time{font-size:12px;font-weight:500;color:var(--brand)}
.live-team1{font-size:20px;font-weight:700;color:#fff;margin-top:10px;line-height:24px}
.live-vs{font-size:13px;font-weight:700;color:var(--green-soft);margin-top:6px;line-height:16px}
.live-team2{font-size:15px;font-weight:700;color:#fff;margin-top:4px;line-height:18px}
/* history */
.section-title{font-size:16px;font-weight:900;margin-top:20px;line-height:19px}
.history-list{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.history-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  min-height:92px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.history-card .info{min-width:0}
.history-card .date{font-size:12px;color:var(--gray);line-height:14px}
.history-card .teams{font-size:13px;font-weight:700;color:var(--ink);margin-top:8px;line-height:16px}
.history-card .teams--lg{font-size:14px;line-height:17px}
.history-card .status{font-size:11px;color:var(--gray);margin-top:6px;line-height:13px}
.history-card .status--win{color:var(--brand)}
.btn-score{
  flex:none;width:96px;height:36px;border-radius:10px;border:none;
  background:var(--brand);color:#fff;
  font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;
}
.badge{
  flex:none;width:88px;height:28px;border-radius:14px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;
}
.badge--wait{background:var(--gold)}
.badge--done{background:var(--brand)}
/* tabbar */
nav.tabbar{
  background:var(--surface);
  border-top:1px solid var(--border);
  height:80px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  padding-top:45px;
}
nav.tabbar a{
  text-align:center;text-decoration:none;
  font-size:11px;font-weight:500;color:var(--gray);line-height:13px;
}
nav.tabbar a.on{color:var(--brand)}
</style>
</head>
<body>
<div class="phone">
  <header>
    <h1>내 경기</h1>
    <div class="tabs">
      <button class="tab tab--on" type="button">예정</button>
      <button class="tab tab--off" type="button">완료</button>
    </div>
  </header>

  <main>
    <section class="live-card">
      <span class="live-badge">LIVE</span>
      <div class="live-meta">
        <span class="next">다음 경기 · 코트 3</span>
        <span class="time">오후 2:30 시작 예정</span>
      </div>
      <p class="live-team1">김민준 · 이서연</p>
      <p class="live-vs">VS</p>
      <p class="live-team2">박지훈 · 정수빈</p>
    </section>

    <h2 class="section-title">지난 경기 결과</h2>
    <section class="history-list">
      <article class="history-card">
        <div class="info">
          <p class="date">8월 2일 · 코트 1</p>
          <p class="teams teams--lg">박지훈 · 정수빈</p>
          <p class="status">경기 종료 · 점수 입력 대기</p>
        </div>
        <button class="btn-score" type="button">점수 입력</button>
      </article>

      <article class="history-card">
        <div class="info">
          <p class="date">7월 28일 · 코트 2</p>
          <p class="teams">김민준/이서연 vs 최현우/송지민</p>
          <p class="status">11:7, 9:11, 11:8 · 내가 입력함</p>
        </div>
        <span class="badge badge--wait">확인 대기</span>
      </article>

      <article class="history-card">
        <div class="info">
          <p class="date">7월 21일 · 코트 4</p>
          <p class="teams">김민준/이서연 vs 박지훈/조예진</p>
          <p class="status status--win">11:5, 11:9 · 승리</p>
        </div>
        <span class="badge badge--done">확정</span>
      </article>
    </section>
  </main>

  <nav class="tabbar">
    <a href="#">탐색</a>
    <a href="#" class="on">내 경기</a>
    <a href="#">알림</a>
    <a href="#">마이</a>
  </nav>
</div>
</body>
</html>
