<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N16 지역 선택 모달</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#558d60;
    --ink:#1f2937;
    --bg:#f7faf8;
    --surface:#ffffff;
    --line:#e4e7e5;
    --muted:#6b7280;
    --faint:#9ca3af;
    --header-bg:#eef5f0;
    --pill-bg:#e3eee6;
    --pill-line:#c8decd;
    --assoc:#4c7857;
    --scrim:#00000073;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Noto Sans KR',sans-serif;
    background:#e9ecef;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px 0;
  }
  .screen{
    width:390px;
    height:844px;
    background:var(--bg);
    box-shadow:0 12px 40px rgba(15,27,45,.14);
    border-radius:8px;
    overflow:hidden;
    position:relative;
  }
  /* ---------- background home screen (M1) ---------- */
  .home-header{
    background:var(--header-bg);
    height:206px;
    padding:16px 24px 0;
    position:relative;
  }
  .status-time{font-size:13px;font-weight:700;color:var(--ink);}
  .logo{
    margin-top:12px;
    font-size:34px;
    font-weight:900;
    letter-spacing:-1px;
    line-height:1.2;
  }
  .logo .g{color:#4a7d3f;}
  .logo .o{color:#e0632f;}
  .logo .y{color:#e3a51f;}
  .assoc-pill{
    display:inline-block;
    margin-top:6px;
    background:rgba(85,141,96,.16);
    border-radius:13px;
    padding:6px 11px;
    font-size:11px;font-weight:500;color:var(--assoc);
  }
  .home-headline{
    margin-top:11px;
    font-size:22px;font-weight:700;color:var(--ink);
  }
  .bell-bg{
    position:absolute;
    top:50px;right:24px;
    width:40px;height:40px;
    border-radius:50%;
    background:rgba(85,141,96,.16);
    display:flex;align-items:center;justify-content:center;
  }
  .home-search{
    position:relative;
    margin:-24px 20px 0;
    height:52px;
    background:var(--surface);
    border-radius:14px;
    box-shadow:0 6px 16px rgba(18,48,58,.09);
    display:flex;align-items:center;
    padding:0 16px;
    gap:8px;
    font-size:14px;color:var(--faint);
  }
  .filter-row{
    margin:18px 20px 0;
    display:flex;
    justify-content:space-between;
  }
  .region-pill{
    height:42px;
    background:var(--pill-bg);
    border:1px solid var(--pill-line);
    border-radius:21px;
    display:flex;align-items:center;
    padding:0 14px;
    gap:8px;
    font-size:14px;font-weight:700;color:var(--brand);
  }
  .sort-pill{
    height:42px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:21px;
    display:flex;align-items:center;
    padding:0 14px;
    gap:12px;
    font-size:13px;font-weight:500;color:var(--muted);
  }
  .chip-row{
    margin:22px 20px 0;
    display:flex;
    gap:8px;
  }
  .chip{
    height:36px;
    border-radius:18px;
    display:flex;align-items:center;
    padding:0 17px;
    font-size:13px;font-weight:500;
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--muted);
  }
  .chip.active{
    background:var(--brand);
    border:none;
    color:var(--surface);
  }
  /* ---------- scrim ---------- */
  .scrim{
    position:absolute;
    inset:0;
    background:var(--scrim);
  }
  /* ---------- bottom sheet ---------- */
  .sheet{
    position:absolute;
    left:0;right:0;bottom:0;
    height:480px;
    background:var(--surface);
    border-radius:24px 24px 0 0;
    display:flex;
    flex-direction:column;
    padding:12px 0 16px;
  }
  .drag-handle{
    width:40px;height:4px;
    border-radius:2px;
    background:var(--line);
    margin:0 auto;
  }
  .sheet h2{
    margin:16px 20px 0;
    font-size:17px;font-weight:900;color:var(--ink);
  }
  .sheet-divider{
    margin-top:16px;
    height:1px;
    background:var(--line);
  }
  .region-list{
    list-style:none;
    margin-top:4px;
    padding:0 20px;
  }
  .region-list li{height:52px;}
  .region-list label{
    display:flex;
    align-items:center;
    gap:12px;
    height:100%;
    cursor:pointer;
    font-size:15px;font-weight:500;color:var(--ink);
  }
  .region-list input{
    appearance:none;
    -webkit-appearance:none;
    width:20px;height:20px;
    border-radius:50%;
    border:1.5px solid var(--faint);
    background:var(--surface);
    margin:0;
    cursor:pointer;
    flex:0 0 auto;
  }
  .region-list input:checked{
    border:none;
    background:var(--brand);
    position:relative;
  }
  .region-list input:checked::after{
    content:"";
    position:absolute;
    left:7px;top:7px;
    width:6px;height:6px;
    border-radius:50%;
    background:var(--surface);
  }
  .region-list input:checked + span{font-weight:700;}
  .btn-apply{
    margin:auto 20px 0;
    height:52px;
    background:var(--brand);
    border:none;border-radius:14px;
    font-family:'Noto Sans KR',sans-serif;
    font-size:16px;font-weight:700;color:var(--surface);
    cursor:pointer;
  }
</style>
</head>
<body>
  <div class="screen">
    <!-- 배경: 탐색 홈 상단 -->
    <div class="home-bg" aria-hidden="true">
      <header class="home-header">
        <p class="status-time">9:41</p>
        <p class="logo"><span class="g">Ha</span><span class="o">p</span><span class="y">p</span><span class="g">ickle</span></p>
        <span class="assoc-pill">대한피클볼협회 공식</span>
        <p class="home-headline">어떤 대회에 나가볼까요?</p>
        <span class="bell-bg">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3C8.7 3 6.5 5.4 6.5 8.5C6.5 12 5 13.5 4.5 14.5C4.2 15.1 4.5 16 5.4 16H18.6C19.5 16 19.8 15.1 19.5 14.5C19 13.5 17.5 12 17.5 8.5C17.5 5.4 15.3 3 12 3Z" stroke="#1f2937" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M10.3 19.5C10.7 20.3 11.3 20.7 12 20.7C12.7 20.7 13.3 20.3 13.7 19.5" stroke="#1f2937" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </span>
      </header>

      <div class="home-search">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="9.2" cy="9.2" r="5.8" stroke="#9ca3af" stroke-width="1.6"/>
          <path d="M13.7 13.7L16.7 16.7" stroke="#9ca3af" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        대회명으로 검색
      </div>

      <div class="filter-row">
        <span class="region-pill">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 2.25C6.4 2.25 4.3 4.3 4.3 6.9C4.3 10.4 9 15.75 9 15.75C9 15.75 13.7 10.4 13.7 6.9C13.7 4.3 11.6 2.25 9 2.25Z" fill="#558d60"/>
            <circle cx="9" cy="7.1" r="1.9" fill="#e3eee6"/>
          </svg>
          서울특별시
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3.5 5.25L7 8.75L10.5 5.25" stroke="#1f2937" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="sort-pill">
          최신순
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3.5 5.25L7 8.75L10.5 5.25" stroke="#5b6b72" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </div>

      <div class="chip-row">
        <span class="chip active">접수중</span>
        <span class="chip">접수마감</span>
        <span class="chip">종료</span>
      </div>
    </div>

    <!-- 딤 -->
    <div class="scrim" aria-hidden="true"></div>

    <!-- 바텀시트 -->
    <section class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
      <div class="drag-handle" aria-hidden="true"></div>
      <h2 id="sheet-title">지역 선택</h2>
      <div class="sheet-divider"></div>

      <ul class="region-list">
        <li>
          <label><input type="radio" name="region" checked><span>서울특별시</span></label>
        </li>
        <li>
          <label><input type="radio" name="region"><span>경기도</span></label>
        </li>
        <li>
          <label><input type="radio" name="region"><span>인천광역시</span></label>
        </li>
        <li>
          <label><input type="radio" name="region"><span>부산광역시</span></label>
        </li>
        <li>
          <label><input type="radio" name="region"><span>대구광역시</span></label>
        </li>
        <li>
          <label><input type="radio" name="region"><span>전체 지역</span></label>
        </li>
      </ul>

      <button class="btn-apply">적용하기</button>
    </section>
  </div>
</body>
</html>
