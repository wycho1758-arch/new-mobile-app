name: Quality gate
on:
  pull_request:
    branches: ['main']
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:runtime
      - run: pnpm turbo run lint test
      - id: local-harness-changes
        name: Detect Codex local harness changes
        shell: bash
        run: |
          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD)"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(\.agents/.*|\.codex/.*|evals/local-harness/.*|scripts/lib/.*|scripts/(validate-runtime-artifacts|validate-repo-operations|codex-headless-review|test-hooks|test-local-harness|clean-tree-guard|codex-preflight|validate-project-environment)\.mjs|\.github/workflows/.*\.yml|AGENTS\.md|PROJECT_ENVIRONMENT\.md|REPO_OPERATIONS\.md|package\.json|pnpm-lock\.yaml)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.local-harness-changes.outputs.changed == 'true'
        run: pnpm run test:local-harness
